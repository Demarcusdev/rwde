<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0b2c4a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="RW Decision" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <title>Regulated Worker Decision Engine</title>

  <style>
    :root{
      --bg:#0b1220;
      --text:#eaf0f7;
      --muted:#a9b8c9;
      --line:rgba(255,255,255,0.08);
      --brand:#2aa8ff;
      --brand2:#66d3ff;
      --danger:#ff5b6b;
      --shadow: 0 12px 30px rgba(0,0,0,0.35);
      --radius: 16px;
      --radius2: 12px;
      --max: 900px;
      --tap: 48px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
      background:
        radial-gradient(1200px 700px at 30% 0%, rgba(42,168,255,0.18), transparent 45%),
        radial-gradient(900px 600px at 90% 20%, rgba(102,211,255,0.12), transparent 40%),
        linear-gradient(180deg, #08101d 0%, #070d17 100%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .container{
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
      padding:18px 0 22px;
      min-height:100%;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    header{
      background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px 16px 14px;
      position:sticky;
      top:10px;
      z-index:10;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    #progress-bar{
      width:100%;
      height:10px;
      background:rgba(255,255,255,0.08);
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.08);
    }

    #progress{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, var(--brand), var(--brand2));
      border-radius:999px;
      transition:width 220ms ease;
    }

    .title-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-top:10px;
    }

    h1{
      font-size:1.05rem;
      line-height:1.2;
      margin:0;
      letter-spacing:0.2px;
    }

    .subtitle{
      margin:6px 0 0;
      color:var(--muted);
      font-size:0.92rem;
      line-height:1.25;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      color:var(--muted);
      white-space:nowrap;
      user-select:none;
    }

    .header-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
    }

    .mini-btn{
      height:34px;
      padding:0 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      color:var(--text);
      font-size:0.88rem;
      font-weight:650;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    .mini-btn:disabled{
      opacity:0.5;
      cursor:not-allowed;
    }

    .toggle{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      user-select:none;
    }

    .toggle input{
      width:18px;
      height:18px;
    }

    main{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
    }

    .q-meta{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      color:var(--muted);
      font-size:0.9rem;
    }

    .q-title{
      font-size:1.05rem;
      margin:0 0 10px;
      line-height:1.25;
    }

    .q-help{
      margin:0 0 12px;
      color:var(--muted);
      font-size:0.95rem;
      line-height:1.35;
    }

    .answers{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:6px;
    }

    .choice{
      display:flex;
      align-items:flex-start;
      gap:12px;
      padding:12px;
      border-radius:var(--radius2);
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(10, 18, 32, 0.55);
      transition:transform 120ms ease, border-color 120ms ease, background 120ms ease;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .choice:active{ transform:scale(0.99); }
    .choice:hover{ border-color:rgba(102,211,255,0.35); }

    .radio, .check{
      width:20px;
      height:20px;
      margin-top:2px;
      flex:0 0 20px;
      position:relative;
      border:2px solid rgba(255,255,255,0.35);
      background:transparent;
    }

    .radio{ border-radius:999px; }
    .check{ border-radius:6px; }

    .choice.selected{
      border-color:rgba(42,168,255,0.65);
      background:rgba(42,168,255,0.10);
    }

    .choice.selected .radio,
    .choice.selected .check{
      border-color:rgba(102,211,255,0.9);
    }

    .choice.selected .radio::after{
      content:"";
      position:absolute;
      inset:4px;
      border-radius:999px;
      background:linear-gradient(180deg, var(--brand2), var(--brand));
    }

    .choice.selected .check::after{
      content:"";
      position:absolute;
      left:5px;
      top:1px;
      width:6px;
      height:11px;
      border:solid rgba(102,211,255,0.95);
      border-width:0 3px 3px 0;
      transform:rotate(45deg);
    }

    .choice .label{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }

    .choice .label strong{
      font-weight:650;
      font-size:0.98rem;
      line-height:1.25;
    }

    .choice .label span{
      color:var(--muted);
      font-size:0.92rem;
      line-height:1.25;
    }

    .text-input,
    .small-input{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(0,0,0,0.18);
      color:var(--text);
      outline:none;
      font-size:1rem;
    }

    .text-input{
      resize:vertical;
      min-height:110px;
    }

    .small-input{
      height:46px;
    }

    .text-input::placeholder,
    .small-input::placeholder{
      color:rgba(169,184,201,0.7);
    }

    .note{
      margin-top:10px;
      padding:12px;
      border-radius:12px;
      border:1px dashed rgba(255,255,255,0.18);
      color:var(--muted);
      font-size:0.92rem;
      line-height:1.35;
      background:rgba(255,255,255,0.03);
    }

    footer{
      display:flex;
      gap:10px;
      position:sticky;
      bottom:12px;
      padding:0;
      z-index:10;
    }

    .nav-btn{
      height:var(--tap);
      padding:0 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      color:var(--text);
      font-size:1rem;
      font-weight:650;
      letter-spacing:0.2px;
      cursor:pointer;
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      -webkit-tap-highlight-color:transparent;
      box-shadow:0 10px 24px rgba(0,0,0,0.22);
    }

    .nav-btn.primary{
      background:linear-gradient(180deg, rgba(42,168,255,0.95), rgba(42,168,255,0.72));
      border-color:rgba(102,211,255,0.55);
      color:#061426;
    }

    .nav-btn:disabled{
      opacity:0.45;
      cursor:not-allowed;
      box-shadow:none;
    }

    #pdf-content{
      background:#fff;
      color:#000;
      padding:20px;
      border-radius:12px;
      font-size:0.98rem;
    }

    #pdf-content h2,
    #pdf-content h3{
      color:#003a6d;
      margin-top:0.6rem;
    }

    #pdf-content .kv{
      display:grid;
      grid-template-columns:160px 1fr;
      gap:6px 12px;
      font-size:0.94rem;
      margin:10px 0 14px;
    }

    #pdf-content .kv div:first-child{
      color:#333;
      font-weight:700;
    }

    #pdf-content .kv div:last-child{
      color:#111;
    }

    #pdf-content ul{
      margin:8px 0 0 18px;
      padding:0;
    }

    #pdf-content li{ margin:6px 0; }

    #pdf-content .do-not{
      color:#b30000;
      font-weight:650;
    }

    #pdf-content .disclaimer{
      margin-top:14px;
      padding:10px 12px;
      border-left:4px solid #003a6d;
      background:#f3f7ff;
      color:#0b1a2a;
      font-size:0.92rem;
      line-height:1.35;
    }

    .results-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .results-actions .nav-btn{
      flex:1 1 160px;
      position:static;
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:999;
    }

    .modal{
      width:min(520px, 100%);
      background:linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border:1px solid rgba(255,255,255,0.14);
      border-radius:16px;
      box-shadow:0 20px 60px rgba(0,0,0,0.6);
      padding:14px;
    }

    .modal h3{
      margin:0 0 8px;
      font-size:1.05rem;
    }

    .modal p{
      margin:0 0 10px;
      color:var(--muted);
      line-height:1.35;
      font-size:0.95rem;
    }

    .modal .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .modal .row .nav-btn{
      flex:1 1 180px;
    }

    @media (max-width: 360px){
      h1{ font-size:1rem; }
      .subtitle{ font-size:0.88rem; }
      .choice{ padding:11px; }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <div id="progress-bar" aria-label="Progress">
        <div id="progress"></div>
      </div>

      <div class="title-row">
        <div>
          <h1>Regulated Worker Decision Engine</h1>
          <p class="subtitle">Educational decision-support for regulated work situations (offline-friendly).</p>
        </div>

        <div class="header-actions">
          <div class="pill" id="status-pill">Step 1 of 7</div>

          <label class="toggle" title="Disable saving on this device">
            <input type="checkbox" id="private-toggle" />
            <span>Private Mode</span>
          </label>

          <button class="mini-btn" id="lock-btn" type="button">🔒 Passcode</button>
          <button class="mini-btn" id="resume-btn" type="button">Resume</button>
          <button class="mini-btn" id="clear-btn" type="button">Clear</button>
        </div>
      </div>
    </header>

    <main id="form-container" aria-live="polite"></main>

    <footer>
      <button id="back-btn" class="nav-btn" disabled>← Back</button>
      <button id="next-btn" class="nav-btn primary" disabled>Next →</button>
    </footer>
  </div>

  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal">
      <h3 id="modal-title">Passcode</h3>
      <p id="modal-desc">Set a passcode to encrypt saved sessions on this device.</p>
      <input id="modal-passcode" class="small-input" type="password" autocomplete="off" placeholder="Enter passcode" />
      <div class="row">
        <button id="modal-cancel" class="nav-btn" type="button">Cancel</button>
        <button id="modal-ok" class="nav-btn primary" type="button">OK</button>
      </div>
      <div class="note" style="margin-top:12px;">
        Private Mode disables saving. Passcode protection encrypts saved sessions on this device.
      </div>
    </div>
  </div>

<script src="./html2pdf.bundle.min.js"></script>

  <script>
    const STORAGE_KEY = "rwde_session_v3";
    const SETTINGS_KEY = "rwde_settings_v3";

    const defaultSettings = {
      privateMode: false,
      cryptoEnabled: false
    };

    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (!raw) return { ...defaultSettings };
        const parsed = JSON.parse(raw);
        return { ...defaultSettings, ...parsed };
      } catch {
        return { ...defaultSettings };
      }
    }

    function saveSettings() {
      try {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
      } catch {}
    }

    const settings = loadSettings();
    let runtimePasscode = "";

    const container = document.getElementById("form-container");
    const backBtn = document.getElementById("back-btn");
    const nextBtn = document.getElementById("next-btn");
    const progressBar = document.getElementById("progress");
    const statusPill = document.getElementById("status-pill");
    const privateToggle = document.getElementById("private-toggle");
    const lockBtn = document.getElementById("lock-btn");
    const resumeBtn = document.getElementById("resume-btn");
    const clearBtn = document.getElementById("clear-btn");

    const modalBackdrop = document.getElementById("modal-backdrop");
    const modalTitle = document.getElementById("modal-title");
    const modalDesc = document.getElementById("modal-desc");
    const modalPasscode = document.getElementById("modal-passcode");
    const modalCancel = document.getElementById("modal-cancel");
    const modalOk = document.getElementById("modal-ok");

    const answers = {};
    let step = 0;

    const questions = [
      {
        id: "safety_risk",
        type: "single",
        title: "Is there an immediate safety risk to people, equipment, or operations?",
        help: "Think: injury risk, unsafe movement, hazardous condition, unsecured equipment, imminent incident potential.",
        options: [
          { value: "yes", label: "Yes", detail: "There is an immediate hazard or safety concern." },
          { value: "no", label: "No", detail: "No immediate hazard identified." }
        ]
      },
      {
        id: "context_flags",
        type: "multi",
        title: "Which of these best describe the situation? (Select all that apply)",
        help: "This helps tailor the recommendations. Choose only what you’re confident about.",
        options: [
          { value: "injury", label: "Injury / medical concern", detail: "Someone may be hurt or needs evaluation." },
          { value: "near_miss", label: "Near-miss", detail: "Close call, no damage/injury but serious potential." },
          { value: "damage", label: "Property/equipment damage", detail: "Any damage or suspected damage." },
          { value: "rule", label: "Possible rule/procedure issue", detail: "Concern about compliance or instruction." },
          { value: "hazmat", label: "Hazmat / environmental concern", detail: "Spill, leak, exposure, contamination risk." }
        ],
        allowOther: true,
        otherLabel: "Other (optional)",
        otherPlaceholder: "Briefly describe…"
      },
      {
        id: "fatigue",
        type: "single",
        title: "Are you experiencing fatigue or impairment that could affect safe performance?",
        help: "Examples: extreme sleep loss, illness symptoms, medication side-effects, alcohol/drugs, or other impairment.",
        options: [
          { value: "yes", label: "Yes", detail: "I may not be fit for duty or safe to perform tasks." },
          { value: "no", label: "No", detail: "I’m fit for duty to the best of my knowledge." }
        ]
      },
      {
        id: "incident",
        type: "single",
        title: "Has an incident, near-miss, rule issue, or injury occurred (or been alleged)?",
        help: "Includes property damage, close calls, potential rule violations, and any reportable events per employer policy.",
        options: [
          { value: "yes", label: "Yes", detail: "Something occurred or is alleged to have occurred." },
          { value: "no", label: "No", detail: "No incident/near-miss/injury to report." }
        ]
      },
      {
        id: "testing",
        type: "single",
        title: "Are you being directed to testing, questioning, or a written statement right now?",
        help: "Examples: drug/alcohol testing, formal interview, written narrative, “tell us exactly what happened.”",
        options: [
          { value: "testing_or_statement", label: "Yes (testing / statement / interview)", detail: "A supervisor/official request is happening now." },
          { value: "not_now", label: "Not right now", detail: "No immediate request at this moment." }
        ]
      },
      {
        id: "documentation",
        type: "single",
        title: "Do you have access to relevant documents or records you should preserve?",
        help: "Examples: timesheets, messages, work orders, logs, device screenshots, emails, photos.",
        options: [
          { value: "yes", label: "Yes", detail: "I have or can access relevant records." },
          { value: "no", label: "No / Unsure", detail: "I don’t have records, or I’m unsure what exists." }
        ]
      },
      {
        id: "notes",
        type: "text",
        title: "Optional: add brief notes for your own record",
        help: "Keep it factual: what/when/where/who. Avoid speculation. This will appear in your PDF.",
        placeholder: "Example: 03/05 14:20 - observed ______; notified ______; actions taken ______."
      }
    ];

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function uniq(arr) {
      const seen = new Set();
      const out = [];
      for (const item of arr) {
        const key = String(item).trim();
        if (!key || seen.has(key)) continue;
        seen.add(key);
        out.push(key);
      }
      return out;
    }

    function getMultiAnswer(id) {
      const value = answers[id];
      if (Array.isArray(value)) return value;
      if (typeof value === "string" && value) return [value];
      return [];
    }

    function setMultiAnswer(id, arr) {
      answers[id] = uniq(arr);
    }

    function percentComplete() {
      const total = questions.length + 1;
      return Math.round(((step + 1) / total) * 100);
    }

    function setProgressUI() {
      progressBar.style.width = percentComplete() + "%";
      statusPill.textContent = step < questions.length
        ? `Step ${step + 1} of ${questions.length}`
        : "Results";
    }

    function isCryptoAvailable() {
      return !!(window.crypto && window.crypto.subtle);
    }

    function syncHeaderUI() {
      privateToggle.checked = !!settings.privateMode;
      const hasSaved = !!loadSessionRaw() && !settings.privateMode;
      resumeBtn.disabled = !hasSaved;
      clearBtn.disabled = !hasSaved;
    }

    function isStepAnswerValid() {
      if (step >= questions.length) return true;
      const q = questions[step];

      if (q.type === "single") {
        return typeof answers[q.id] === "string" && answers[q.id].length > 0;
      }

      if (q.type === "multi") {
        const selected = getMultiAnswer(q.id);
        const otherText = (answers[q.id + "_otherText"] || "").trim();
        return selected.length > 0 || (q.allowOther && otherText.length > 0);
      }

      if (q.type === "text") {
        return true;
      }

      return false;
    }

    function loadSessionRaw() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    function clearSession() {
      try {
        localStorage.removeItem(STORAGE_KEY);
      } catch {}
      syncHeaderUI();
    }

    function sessionPayload() {
      return {
        step,
        answers,
        savedAt: Date.now(),
        app: "rwde",
        ver: 3
      };
    }

    function bufToB64(buf) {
      const bytes = new Uint8Array(buf);
      let bin = "";
      for (const b of bytes) bin += String.fromCharCode(b);
      return btoa(bin);
    }

    function b64ToBuf(b64) {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes.buffer;
    }

    async function deriveKey(passcode, saltBuf, iterations) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        "raw",
        enc.encode(passcode),
        { name: "PBKDF2" },
        false,
        ["deriveKey"]
      );

      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: saltBuf,
          iterations,
          hash: "SHA-256"
        },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
      );
    }

    async function encryptJSON(obj, passcode) {
      const plain = new TextEncoder().encode(JSON.stringify(obj));
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const iterations = 210000;
      const key = await deriveKey(passcode, salt.buffer, iterations);
      const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, plain);

      return {
        v: 1,
        enc: "AES-GCM",
        kdf: "PBKDF2",
        iter: iterations,
        salt: bufToB64(salt.buffer),
        iv: bufToB64(iv.buffer),
        ct: bufToB64(cipher)
      };
    }

    async function decryptJSON(blob, passcode) {
      const saltBuf = b64ToBuf(blob.salt);
      const ivBuf = b64ToBuf(blob.iv);
      const ctBuf = b64ToBuf(blob.ct);
      const key = await deriveKey(passcode, saltBuf, Number(blob.iter) || 210000);
      const plainBuf = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: new Uint8Array(ivBuf) },
        key,
        ctBuf
      );
      return JSON.parse(new TextDecoder().decode(plainBuf));
    }

    async function persistNow() {
      if (settings.privateMode) return;

      const payload = sessionPayload();

      try {
        if (settings.cryptoEnabled && runtimePasscode && isCryptoAvailable()) {
          const encBlob = await encryptJSON(payload, runtimePasscode);
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            encrypted: true,
            encBlob
          }));
        } else {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            encrypted: false,
            plaintext: payload
          }));
        }
      } catch {}

      syncHeaderUI();
    }

    function restorePayload(payload) {
      if (!payload || typeof payload !== "object") return;
      for (const key of Object.keys(answers)) delete answers[key];

      if (payload.answers && typeof payload.answers === "object") {
        for (const [key, value] of Object.entries(payload.answers)) {
          answers[key] = value;
        }
      }

      step = clamp(Number(payload.step) || 0, 0, questions.length);
    }

    function openModal({ title, desc, placeholder, onOk }) {
      modalTitle.textContent = title;
      modalDesc.textContent = desc;
      modalPasscode.value = "";
      modalPasscode.placeholder = placeholder || "Enter passcode";
      modalBackdrop.style.display = "flex";
      modalBackdrop.setAttribute("aria-hidden", "false");

      const cleanup = () => {
        modalBackdrop.style.display = "none";
        modalBackdrop.setAttribute("aria-hidden", "true");
        modalCancel.onclick = null;
        modalOk.onclick = null;
        document.onkeydown = null;
      };

      modalCancel.onclick = cleanup;
      modalOk.onclick = async () => {
        const val = modalPasscode.value;
        cleanup();
        await onOk(val);
      };

      document.onkeydown = (e) => {
        if (e.key === "Escape") cleanup();
        if (e.key === "Enter") {
          e.preventDefault();
          modalOk.click();
        }
      };

      setTimeout(() => modalPasscode.focus(), 50);
    }

    function createSection(root, title, items, isAvoid = false) {
      const h3 = document.createElement("h3");
      h3.textContent = title;
      root.appendChild(h3);

      const ul = document.createElement("ul");
      (items || []).forEach(text => {
        const li = document.createElement("li");
        if (isAvoid) {
          li.innerHTML = `<span class="do-not">${escapeHtml(text)}</span>`;
        } else {
          li.textContent = text;
        }
        ul.appendChild(li);
      });

      root.appendChild(ul);
    }

    function decisionEngine(a) {
      const immediate = [];
      const avoid = [];
      const docs = [];
      const timing = [];

      immediate.push("Pause and ensure the area or operation is safe before continuing.");
      immediate.push("If needed, notify the appropriate supervisor, dispatcher, or control point per your procedures.");
      timing.push("If an event is time-sensitive, record the time and sequence of actions as soon as you safely can.");

      const flags = new Set(getMultiAnswer("context_flags"));
      const otherFlag = (a["context_flags_otherText"] || "").trim();

      if (a.safety_risk === "yes") {
        immediate.push("Stop the task if it can be done safely and secure the situation.");
        immediate.push("Use established protection or notification procedures if applicable to your role.");
        avoid.push("Do not proceed with unsafe movement or work just to keep operations moving.");
        timing.push("Escalate promptly if there is an active hazard.");
      }

      if (flags.has("injury")) {
        immediate.push("If there is any injury concern, seek medical attention and follow your injury reporting procedure.");
        docs.push("Preserve names of witnesses and the timeline of symptoms or observations.");
      }

      if (flags.has("near_miss")) {
        immediate.push("Report near-misses through the proper channel so hazards can be corrected.");
        docs.push("Document the hazard condition and what prevented an incident.");
      }

      if (flags.has("damage")) {
        immediate.push("If damage is suspected, secure equipment or area and report per procedure.");
        docs.push("Preserve photos of damage or conditions if allowed and safe.");
        avoid.push("Avoid moving or altering damaged equipment unless required for safety and authorized by procedure.");
      }

      if (flags.has("rule")) {
        immediate.push("If you believe an instruction conflicts with rules or procedures, request clarification and follow escalation steps per policy.");
        avoid.push("Do not knowingly bypass rules or procedures to satisfy schedule pressure.");
        docs.push("Preserve any written instructions or messages relevant to the decision if permitted.");
      }

      if (flags.has("hazmat")) {
        immediate.push("If there is any hazmat or environmental concern, follow emergency response procedures and notify the proper contacts immediately.");
        avoid.push("Do not touch unknown substances or enter restricted areas without proper authorization or PPE.");
        docs.push("Preserve any SDS references, shipment or consist info, and notification logs if available.");
      }

      if (otherFlag) {
        docs.push("Other context noted: " + otherFlag);
      }

      if (a.fatigue === "yes") {
        immediate.push("Self-assess fitness-for-duty and follow your fitness-for-duty reporting process.");
        avoid.push("Do not operate equipment or perform safety-sensitive tasks if you believe you may be impaired or unsafe.");
        timing.push("Report concerns as early as possible before a task begins whenever feasible.");
        docs.push("Preserve relevant schedule or rest documentation if fatigue is involved.");
      }

      if (a.incident === "yes") {
        immediate.push("Follow your incident or near-miss reporting procedure and request medical attention if needed.");
        docs.push("Preserve factual details: who was present, where it occurred, what was observed, and the timeline.");
        docs.push("If allowed, preserve photos or screenshots of conditions, equipment state, and messages.");
        avoid.push("Avoid speculating about causes or assigning blame in initial reporting.");
        timing.push("Write down factual notes while details are fresh, but only when safe to do so.");
      }

      if (a.testing === "testing_or_statement") {
        immediate.push("If directed to testing, follow the instruction calmly and ask clarifying questions about process steps.");
        avoid.push("Do not sign statements you have not read or that you believe are inaccurate or incomplete.");
        timing.push("If asked for a written statement immediately, consider requesting a short time to collect your facts and ensure accuracy per policy.");
        docs.push("Preserve copies or photos of any documents you are given or asked to sign if permitted.");
      }

      if (a.documentation === "yes") {
        docs.push("Preserve relevant records in their original form and avoid editing or overwriting metadata.");
        avoid.push("Do not delete messages, logs, or photos that could later matter to a compliance review.");
      } else {
        docs.push("List what you think exists and where it might be located so you can request it later if needed.");
      }

      if (typeof a.notes === "string" && a.notes.trim().length) {
        docs.push("Your notes were captured in this report. Keep them factual and time-stamped for your own reference.");
      }

      return {
        immediate: uniq(immediate),
        avoid: uniq(avoid),
        docs: uniq(docs),
        timing: uniq(timing)
      };
    }

    function renderQuestion(q, index) {
      const card = document.createElement("div");
      card.className = "card";

      const meta = document.createElement("div");
      meta.className = "q-meta";
      meta.innerHTML = `
        <div class="pill">Question ${index + 1}</div>
        <div class="pill">${q.type === "single" ? "Select one" : q.type === "multi" ? "Select any" : "Optional"}</div>
      `;
      card.appendChild(meta);

      const title = document.createElement("h2");
      title.className = "q-title";
      title.textContent = q.title;
      card.appendChild(title);

      if (q.help) {
        const help = document.createElement("p");
        help.className = "q-help";
        help.textContent = q.help;
        card.appendChild(help);
      }

      if (q.type === "single") {
        const wrap = document.createElement("div");
        wrap.className = "answers";
        const current = answers[q.id] || "";

        q.options.forEach(opt => {
          const item = document.createElement("div");
          item.className = "choice" + (current === opt.value ? " selected" : "");
          item.setAttribute("role", "button");
          item.setAttribute("tabindex", "0");
          item.innerHTML = `
            <div class="radio" aria-hidden="true"></div>
            <div class="label">
              <strong>${escapeHtml(opt.label)}</strong>
              <span>${escapeHtml(opt.detail || "")}</span>
            </div>
          `;

          const select = async () => {
            answers[q.id] = opt.value;
            await persistNow();
            render();
          };

          item.addEventListener("click", select);
          item.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              select();
            }
          });

          wrap.appendChild(item);
        });

        card.appendChild(wrap);

        const note = document.createElement("div");
        note.className = "note";
        note.textContent = "Reminder: This tool is educational decision-support only. Follow your employer rules, training, and applicable regulations.";
        card.appendChild(note);
      }

      if (q.type === "multi") {
        const wrap = document.createElement("div");
        wrap.className = "answers";
        const selected = new Set(getMultiAnswer(q.id));

        q.options.forEach(opt => {
          const isOn = selected.has(opt.value);
          const item = document.createElement("div");
          item.className = "choice" + (isOn ? " selected" : "");
          item.setAttribute("role", "button");
          item.setAttribute("tabindex", "0");
          item.innerHTML = `
            <div class="check" aria-hidden="true"></div>
            <div class="label">
              <strong>${escapeHtml(opt.label)}</strong>
              <span>${escapeHtml(opt.detail || "")}</span>
            </div>
          `;

          const toggle = async () => {
            const arr = getMultiAnswer(q.id);
            const idx = arr.indexOf(opt.value);
            if (idx >= 0) arr.splice(idx, 1);
            else arr.push(opt.value);
            setMultiAnswer(q.id, arr);
            await persistNow();
            render();
          };

          item.addEventListener("click", toggle);
          item.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              toggle();
            }
          });

          wrap.appendChild(item);
        });

        if (q.allowOther) {
          const otherBox = document.createElement("div");
          otherBox.className = "card";
          otherBox.style.marginTop = "12px";
          otherBox.style.background = "rgba(255,255,255,0.03)";
          otherBox.style.borderStyle = "dashed";

          const otherTitle = document.createElement("div");
          otherTitle.style.fontWeight = "650";
          otherTitle.style.marginBottom = "8px";
          otherTitle.textContent = q.otherLabel || "Other";
          otherBox.appendChild(otherTitle);

          const otherInput = document.createElement("input");
          otherInput.type = "text";
          otherInput.className = "small-input";
          otherInput.placeholder = q.otherPlaceholder || "Other…";
          otherInput.value = answers[q.id + "_otherText"] || "";
          otherInput.addEventListener("input", async () => {
            answers[q.id + "_otherText"] = otherInput.value;
            await persistNow();
            nextBtn.disabled = !isStepAnswerValid();
          });
          otherBox.appendChild(otherInput);

          wrap.appendChild(otherBox);
        }

        card.appendChild(wrap);

        const note = document.createElement("div");
        note.className = "note";
        note.textContent = "Select only what you’re confident about. If unsure, leave it unchecked.";
        card.appendChild(note);
      }

      if (q.type === "text") {
        const input = document.createElement("textarea");
        input.className = "text-input";
        input.rows = 5;
        input.placeholder = q.placeholder || "";
        input.value = answers[q.id] || "";
        input.addEventListener("input", async () => {
          answers[q.id] = input.value;
          await persistNow();
          nextBtn.disabled = !isStepAnswerValid();
        });
        card.appendChild(input);

        const note = document.createElement("div");
        note.className = "note";
        note.textContent = "Tip: Keep notes factual and time-stamped. Preserve screenshots or photos only if safe and permitted.";
        card.appendChild(note);
      }

      container.appendChild(card);
    }

    function showResults() {
      container.innerHTML = "";
      progressBar.style.width = "100%";

      const wrap = document.createElement("div");
      wrap.className = "card";

      const summary = document.createElement("div");
      summary.className = "card";
      summary.id = "pdf-content";

      const h2 = document.createElement("h2");
      h2.textContent = "Recommended Actions";
      summary.appendChild(h2);

      const stamp = new Date().toLocaleString([], {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });

      const kv = document.createElement("div");
      kv.className = "kv";
      kv.innerHTML = `
        <div>Generated</div><div>${escapeHtml(stamp)}</div>
        <div>Tool</div><div>Regulated Worker Decision Engine</div>
      `;
      summary.appendChild(kv);

      const { immediate, avoid, docs, timing } = decisionEngine(answers);
      createSection(summary, "Immediate Safe Actions", immediate);
      createSection(summary, "Actions To Avoid", avoid, true);
      createSection(summary, "Documents To Preserve", docs);
      createSection(summary, "Timing Considerations", timing);

      const flags = getMultiAnswer("context_flags");
      const other = (answers["context_flags_otherText"] || "").trim();

      if (flags.length || other) {
        const h3 = document.createElement("h3");
        h3.textContent = "Selected Context";
        summary.appendChild(h3);

        const human = {
          injury: "Injury / medical concern",
          near_miss: "Near-miss",
          damage: "Property/equipment damage",
          rule: "Possible rule/procedure issue",
          hazmat: "Hazmat / environmental concern"
        };

        const list = flags.map(v => human[v] || v);
        if (other) list.push("Other: " + other);

        const p = document.createElement("p");
        p.textContent = list.join("; ");
        summary.appendChild(p);
      }

      const notes = (answers.notes || "").trim();
      if (notes) {
        const h3 = document.createElement("h3");
        h3.textContent = "Your Notes";
        summary.appendChild(h3);

        const p = document.createElement("p");
        p.style.whiteSpace = "pre-wrap";
        p.textContent = notes;
        summary.appendChild(p);
      }

      const disclaimer = document.createElement("div");
      disclaimer.className = "disclaimer";
      disclaimer.textContent =
        "This tool provides educational decision-support only and does not constitute legal advice. Users are responsible for their own decisions.";
      summary.appendChild(disclaimer);

      wrap.appendChild(summary);

      const actions = document.createElement("div");
      actions.className = "results-actions";
      actions.style.marginTop = "12px";

      const pdfBtn = document.createElement("button");
      pdfBtn.type = "button";
      pdfBtn.textContent = "Download PDF";
      pdfBtn.className = "nav-btn primary";
      pdfBtn.onclick = downloadPDF;

      const restartBtn = document.createElement("button");
      restartBtn.type = "button";
      restartBtn.textContent = "Start Over";
      restartBtn.className = "nav-btn";
      restartBtn.onclick = async () => {
        for (const key of Object.keys(answers)) delete answers[key];
        step = 0;
        clearSession();
        await persistNow();
        render();
      };

      actions.appendChild(pdfBtn);
      actions.appendChild(restartBtn);

      container.appendChild(wrap);
      container.appendChild(actions);

      backBtn.disabled = true;
      nextBtn.style.display = "none";
      statusPill.textContent = "Results";

      persistNow();
    }

    function downloadPDF() {
      const element = document.getElementById("pdf-content");
      if (!element) {
        alert("Could not find report content.");
        return;
      }

      if (typeof html2pdf === "undefined") {
        alert("PDF library not loaded.");
        return;
      }

      const opt = {
        margin: 0.4,
        filename: "Decision_Report.pdf",
        image: { type: "jpeg", quality: 0.98 },
        html2canvas: {
          scale: 2,
          useCORS: true,
          backgroundColor: "#ffffff",
          scrollY: 0
        },
        jsPDF: {
          unit: "in",
          format: "letter",
          orientation: "portrait"
        },
        pagebreak: { mode: ["css", "legacy"] }
      };

      element.scrollIntoView({ behavior: "instant", block: "start" });
      html2pdf().set(opt).from(element).save();
    }

    function render() {
      setProgressUI();

      backBtn.disabled = step === 0;

      if (step < questions.length) {
        nextBtn.style.display = "flex";
        nextBtn.textContent = step === questions.length - 1 ? "View Results →" : "Next →";
        nextBtn.disabled = !isStepAnswerValid();
        container.innerHTML = "";
        renderQuestion(questions[step], step);
      } else {
        nextBtn.style.display = "none";
        showResults();
      }

      syncHeaderUI();
    }

    backBtn.addEventListener("click", async () => {
      if (step <= 0) return;
      step = clamp(step - 1, 0, questions.length);
      await persistNow();
      render();
    });

    nextBtn.addEventListener("click", async () => {
      if (step >= questions.length) return;
      if (!isStepAnswerValid()) return;
      step = clamp(step + 1, 0, questions.length);
      await persistNow();
      render();
    });

    privateToggle.addEventListener("change", async () => {
      settings.privateMode = !!privateToggle.checked;
      saveSettings();

      if (settings.privateMode) {
        clearSession();
      } else {
        await persistNow();
      }

      syncHeaderUI();
      render();
    });

    clearBtn.addEventListener("click", () => {
      clearSession();
      alert("Saved session cleared.");
    });

    lockBtn.addEventListener("click", () => {
      if (settings.privateMode) {
        alert("Private Mode is on. Turn it off to enable encrypted saving.");
        return;
      }

      if (!isCryptoAvailable()) {
        alert("Encryption is not available in this browser.");
        return;
      }

      openModal({
        title: "Set Passcode",
        desc: "Set a passcode to encrypt saved sessions on this device.",
        placeholder: "New passcode",
        onOk: async (pass) => {
          if (!pass || pass.length < 4) {
            alert("Please use a passcode of at least 4 characters.");
            return;
          }

          runtimePasscode = pass;
          settings.cryptoEnabled = true;
          saveSettings();
          await persistNow();
          alert("Passcode set. Future saves on this device will be encrypted while this tab remains open.");
        }
      });
    });

    resumeBtn.addEventListener("click", () => {
      if (settings.privateMode) {
        alert("Private Mode is on. Resume is disabled.");
        return;
      }

      const raw = loadSessionRaw();
      if (!raw) {
        alert("No saved session found.");
        return;
      }

      if (raw.encrypted) {
        openModal({
          title: "Unlock Saved Session",
          desc: "Enter your passcode to resume the encrypted saved session.",
          placeholder: "Passcode",
          onOk: async (pass) => {
            if (!pass) {
              alert("Passcode required.");
              return;
            }

            try {
              const payload = await decryptJSON(raw.encBlob, pass);
              runtimePasscode = pass;
              settings.cryptoEnabled = true;
              saveSettings();
              restorePayload(payload);
              render();
            } catch {
              alert("Could not unlock the saved session. The passcode may be incorrect.");
            }
          }
        });
        return;
      }

      if (raw.plaintext) {
        restorePayload(raw.plaintext);
        render();
      }
    });

    function bootFromSavedSession() {
      if (settings.privateMode) {
        clearSession();
        return;
      }

      const raw = loadSessionRaw();
      if (!raw || raw.encrypted) return;
      if (raw.plaintext) restorePayload(raw.plaintext);
    }

    bootFromSavedSession();
    syncHeaderUI();
    render();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch((err) => {
          console.error("Service worker registration failed:", err);
        });
      });
    }
  </script>
</body>
</html>
